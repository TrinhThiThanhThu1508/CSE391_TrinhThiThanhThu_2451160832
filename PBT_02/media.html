<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Giới Thiệu Sản Phẩm Multimedia</title>
</head>
<body>
    <h1>Giới thiệu sản phẩm</h1>

    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:0/q:100/plain/https://cellphones.com.vn/media/wysiwyg/Phone/Apple/iPhone-17/iPhone-17-pro-max-35.jpg"
            alt="iPhone 17 Pro Max"
            loading="lazy"
            style="max-width:100%; height:auto;">
            <figcaption>iPhone 17 Pro Max</figcaption>
    </figure>

    <figure>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtahFztnXSn-aCxOsRpfEx8fKG8mh9uAZ1hQ&s"
            alt="Apple Watch Series 11"
            loading="lazy"
            style="max-width:100%; height:auto;">
            <figcaption>Apple Watch Series 11</figcaption>
    </figure>

    <figure>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRq3bsvDg9X4usdhi5ndIJBQ8PdVOEZXspq5_FkrnXPRA&s"
            loading="lazy"
            style="max-width:100%; height:auto;">
            <figcaption>AirPods Pro 4</figcaption>
    </figure>

    <!-- Video YouTube -->
    <h2>Video giới thiệu</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/70gCxCTpvBg?si=hnj1dUN6Kjm2jhld" 
        title="YouTube video" 
        allowfullscreen>
    </iframe>

    <!--Video local -->
    <h2>Video sản phẩm</h2>

    <video controls poster="https://via.placeholder.com/300">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>

    <!--Audio -->
    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">        
        Trình duyệt không hỗ trợ audio.
    </audio>

    <!--SVG -->
    <h2>Logo (SVG)</h2>
    <svg width="60" height="60">
        <rect width="60" height="60" fill="blue" />
        <circle cx="30" cy="30" r="20" fill="yellow" />
    </svg>

    <footer>
        <p style="text-align: center; color: #888;">&copy; 2026 Trang Multimedia Sản Phẩm</p>
    </footer>

</body>
</html>
