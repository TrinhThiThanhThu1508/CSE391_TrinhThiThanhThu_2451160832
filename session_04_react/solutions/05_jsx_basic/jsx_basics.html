<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSX Basics - Portfolio Hero</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .badge { display: inline-block; padding: 5px 10px; background: #e0e0e0; margin: 5px; border-radius: 4px; }
        .hero { padding: 40px; background: #f5f5f5; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function SkillBadge({ name }) {
            return <span className="badge">{name}</span>;
        }

        function PortfolioHero() {
            const skills = ["React", "JavaScript", "HTML/CSS", "Git"];
            return (
                <div className="hero">
                    <h1>Chào bạn, mình là Lập trình viên Front-End</h1>
                    <p>Dưới đây là các kỹ năng cốt lõi của mình:</p>
                    <div>
                        {skills.map((skill, index) => <SkillBadge key={index} name={skill} />)}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioHero />);
    </script>
</body>
</html>
