<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Tạo tài khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Họ và Tên</label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="Nhập tên của bạn">
                    <span class="status-icon" id="nameIcon"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="abc@gmail.com">
                <div class="error-text" id="emailError">Email không đúng định dạng.</div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-meter">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                    <span class="status-icon" id="confirmIcon"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <div class="input-wrapper">
                    <input type="text" id="phone" placeholder="0901-234-567">
                    <span class="status-icon" id="phoneIcon"></span>
                </div>
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng ký ngay</button>
        </form>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h3>Đăng ký thành công! </h3>
            <div id="modalData"></div>
            <button id="closeModalBtn">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
