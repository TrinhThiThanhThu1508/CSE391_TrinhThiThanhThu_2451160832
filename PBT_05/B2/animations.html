<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions & Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="spinner-container">
        <div class="loading-spinner"></div>
        <p>Đang tải sản phẩm...</p>
    </div>

    <div class="main-content fade-in-scroll">
        
        <div class="product-card">
            
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Giày Thể Thao">
            </div>
            
            <div class="card-info">
                <h3 class="product-title">Giày Thể Thao Premium</h3>
                <p class="product-price">1.500.000 đ</p>
                
                <button class="btn-buy">Mua ngay</button>
            </div>

        </div>

    </div>

</body>
</html>
