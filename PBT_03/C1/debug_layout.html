<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug CSS Layout Box Model</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h2>CÁCH 1: SỬ DỤNG BORDER-BOX </h2>
    <div class="container fix-box-sizing">
        <div class="sidebar">Sidebar (300px)</div>
        <div class="content">Content (660px)</div>
        <div class="clearfix"></div> </div>

    <br><br>

    <h2>CÁCH 2: KHÔNG DÙNG BORDER-BOX (Tính toán trừ thủ công width gốc)</h2>
    <div class="container fix-manual-math">
        <div class="sidebar">Sidebar (Gốc 300px -> Đã sửa thành 258px)</div>
        <div class="content">Content (Gốc 660px -> Đã sửa thành 598px)</div>
        <div class="clearfix"></div>  
    </div>

</body>
</html>
