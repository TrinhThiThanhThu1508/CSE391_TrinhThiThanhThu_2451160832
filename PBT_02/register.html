<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí tài khoản</title>
</head>
<body>
    <h2>Form đăng kí tài khoản</h2>

    <form action="#" method="POST">

        <!-- FIELDSET 1 -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>

             <!-- FIELDSET 1 -->
            <label for="fullname">Họ tên:</label><br>
            <input type="text" id="fullname" name="fullname"
                placeholder="Nhập họ tên"
                required minlength="2" maxlength="50"><br><br>

            <!-- Email -->
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"
                placeholder="abc@email.com"
                required><br><br>

            <!-- SĐT -->
            <label for="phone">Số điện thoại:</label><br>
            <input type="tel" id="phone" name="phone"
                placeholder="0912345678"
                pattern="[0-9]{10}"
                title="Số điện thoại phải có 10 chữ số"><br><br>

            <!-- Ngày sinh -->
            <label for="dtp">Ngày sinh:</label><br>
            <input type="date" id="dtp" name="dtp"
                max="2026-05-10"><br><br>
        </fieldset>
        
        <br>

        <!-- FIELDSET 2 -->
        <fieldset>
            <legend>Tài khoản</legend>

            <!-- Username -->
            <label for="username">Username:</label><br>
            <input type="text" id="username" name="username"
                placeholder="Username123" 
                pattern="[A-Za-z0-9_]{3,20}"
                title="3-20 ký tự, chỉ gồm chữ, số, underscore"><br><br>

            <!-- Password -->
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password"
                required minlength="8"
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                title="Ít nhất 8 ký tự, gồm chữ hoa, thường, và số"><br><br>

            <!-- Confirm Password -->
            <label for="Confirm Password">Xác nhận Password:</label><br>
            <input type="password" id="Confirm Password" name="Confirm Password"
                placeholder="Nhập lại mật khẩu"
                pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                title="Ít nhất 8 ký tự, có 1 chữ hoa và 1 số"
                required><br><br>

        </fieldset>

        <br>

        <!-- FIELDSET 3 -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <!-- Thành phố -->
            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn thành phố --</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
            </select><br><br>

            <!-- Quận/Huyện -->
            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="" disabled selected>-- Chọn Quận/Huyện --</option>
                <option value="q1">Quận 1</option>
                <option value="q2">Quận 2</option>
                <option value="badinh">Quận Ba Đình</option>
                <option value="hoankiem">Quận Hoàn Kiếm</option>
            </select><br><br>

            <!-- Địa chỉ chi tiết -->
            <label for="address">Địa chỉ:</label>
            <textarea id="address" name="address" rows="3"
                      placeholder="Số nhà, đường, phường/xã..."></textarea><br><br>
            
            <p>Giới tính:</p>

            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Nam</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Nữ</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label>

            <br><br>

        </fieldset>

        <br>

        <!-- Điều khoản -->
        <label>
            <input type="checkbox" name="agree" required> 
            Tôi đồng ý điều khoản
        </label>

        <br><br>

        <!-- Buttons -->
        <button type="submit">Đăng ký</button>
        <button type="reset">Nhập lại</button>

    </form>
</body>
</html>
