<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán Đơn Hàng</title>
</head>
<body>
    <h1>Trang Thanh Toán</h1>

    <h2>Giỏ hàng</h2>
    <table border="1">
        <thead>
            <tr>
                <th>STT</th>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>iPhone 15</td>
                <td>25.990.000đ</td>
                <td>1</td>
                <td>25.990.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>MacBook Air 13 inch M4</td>
                <td>25.490.000đ</td>
                <td>1</td>
                <td>25.490.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>AirPods Pro 3</td>
                <td>6.799.000đ</td>
                <td>1</td>
                <td>6.799.000đ</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Tổng cộng</td>
                <td>58.279.000đ</td>
            </tr>
        </tfoot>
    </table>

    <h2>Form Thanh Toán</h2>
    <form>
        <p>Phương thức thanh toán</p>

        <label>
            <input type="radio" name="pay" value="cod">
            Cod
        </label>

        <label>
            <input type="radio" name="pay" value="bank">
            Chuyển khoản
        </label>

        <label>
            <input type="radio" name="pay" value="ví điện tử">
            Ví điện tử
        </label>

        <br><br>

        <label>Mã giảm giá:</label>
        <input type="text" pattern="SALE[0-9]{4}" placeholder="VD: SALE2026">
           
        <br><br>

        <label>Ghi chú:</label><br>
        <textarea rows="4" cols="40"></textarea>
    </form>

    <h2>Thông tin giao hàng</h2>

    <form>
        <label for="delivery-date">Ngày giao hàng:</label>
        <input type="date" 
               id="delivery-date" 
               name="delivery-date"
               min="2026-05-14"
               required>

        <br><br>

        <label>Khung giờ:</label>
        <select>
            <option>Sáng 8-12h</option>
            <option>Chiều 14-18h</option>
            <option>Tối 18-21h</option>
        </select>

        <br><br>

        <label>Số ngày giao:</label>
        <input type="range" min="1" max="7" step="1">
        <br><br>
        <button type="submit" aria-label="Xác nhận đặt hàng">
            Xác nhận đặt hàng
        </button> 

    </form>
</body>
</html>
